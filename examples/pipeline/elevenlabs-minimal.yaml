nodes:
  mic:
    use: "@acpfx/mic-sox"
    settings:
      sampleRate: 16000
    outputs: [stt]

  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
    outputs: [bridge]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: voice
      args:
        approve-all: true
    outputs: [tts]

  tts:
    use: "@acpfx/tts-elevenlabs"
    settings:
      voiceId: JBFqnCBsd6RMkjVDRZzb
    outputs: [player]

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
    outputs: []
