nodes:
  mic:
    use: "@acpfx/mic-speaker"
    settings:
      mode: ptt
      speaker: player
    outputs: [stt]

  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
      turnDetection: false
    outputs: [bridge]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: voice
      args:
        approve-all: true
    outputs: [tts]

  tts:
    use: "@acpfx/tts-elevenlabs"
    settings:
      voiceId: JBFqnCBsd6RMkjVDRZzb
    outputs: [player]

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
    outputs: [mic]
