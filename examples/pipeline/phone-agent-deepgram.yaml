# Phone agent pipeline (Deepgram STT+TTS) — connects Otacon phone to voice AI agent
# Usage: acpfx run examples/pipeline/phone-agent-deepgram.yaml
#
# Incoming calls are auto-answered (whitelist configurable).
# SMS messages are fed to the agent as text input.
# Voice responses go through TTS + audio player → phone (audio).
# Text (SMS) responses go directly to phone node → SMS reply.
# Routing is based on responseMode field set by the bridge.

nodes:
  phone:
    use: "@acpfx/phone-otacon"
    settings:
      otaconUrl: "https://otacon-pi.tail0437b8.ts.net:8080"
      whitelist: "*"
    outputs: [stt, agent]

  stt:
    use: "@acpfx/stt-deepgram"
    settings:
      endpointing: 500
      language: en
      model: nova-3
      turnDetection: true
      utteranceEndMs: 1500
    outputs: [agent]

  tts:
    use: "@acpfx/tts-deepgram"
    settings:
      voice: aura-2-aries-en
    outputs: [player]

  agent:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: phone
      args:
        approve-all: true
    outputs:
      # Voice responses → TTS → player → phone (audio)
      - node: tts
        whenFieldEquals: { responseMode: "voice" }
      - node: player
        whenFieldEquals: { responseMode: "voice" }
      # Text responses → phone (SMS reply)
      - node: phone
        whenFieldEquals: { responseMode: "text" }

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
      sfxVolume: 0.3
    outputs: [phone]
