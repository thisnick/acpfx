nodes:
  mic:
    use: "@acpfx/mic-speaker"
    settings:
      sampleRate: 16000
      speaker: player
    outputs: [stt]

  stt:
    use: "@acpfx/stt-deepgram"
    settings:
      language: en
      model: nova-3
      utteranceEndMs: 2000
      endpointing: 1000
    outputs: [bridge]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: voice
      args:
        approve-all: true
    outputs: [tts, player]

  tts:
    use: "@acpfx/tts-deepgram"
    settings:
      voice: aura-2-aries-en
    outputs: [player]

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
      sfxVolume: 0.3
    outputs: [mic]

