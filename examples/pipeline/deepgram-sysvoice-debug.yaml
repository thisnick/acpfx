nodes:
  mic:
    use: "@acpfx/mic-speaker"
    settings:
      mode: ptt
      sampleRate: 16000
      speaker: player
    outputs: [stt]

  stt:
    use: "@acpfx/stt-deepgram"
    settings:
      language: en
      model: nova-3
      turnDetection: false
    outputs: [bridge]

  bridge:
    use: "@acpfx/bridge-acp"
    settings:
      agent: claude
      permissionMode: approve-all
    outputs: [tts, player]

  tts:
    use: "@acpfx/tts-deepgram"
    settings:
      voice: aura-2-aries-en
    outputs: [player]

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
      sfxVolume: 0.3
    outputs: [mic]

