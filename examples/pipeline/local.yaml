nodes:
  mic:
    use: '@acpfx/mic-speaker'
    settings: {mode: ptt, speaker: player}
    outputs: [stt]
  stt:
    use: '@acpfx/stt-kyutai'
    settings: {model: 'kyutai/stt-1b-en_fr', language: en, device: auto, turnDetection: false}
    outputs: [bridge]
  bridge:
    use: '@acpfx/bridge-acpx'
    settings:
      agent: claude
      session: voice
      args: {approve-all: true}
    outputs: [tts, player]
  tts:
    use: '@acpfx/tts-pocket'
    settings: {voice: alba}
    outputs: [player]
  player:
    use: '@acpfx/audio-player'
    settings: {speechSource: tts}
    outputs: [mic]
