nodes:
  mic:
    use: '@acpfx/mic-speaker'
    settings: {speaker: player}
    outputs: [stt, recorder]
  stt:
    use: '@acpfx/stt-elevenlabs'
    settings: {language: en}
    outputs: [bridge]
  bridge:
    use: '@acpfx/bridge-acpx'
    settings:
      agent: codex
      session: voice
      args: {approve-all: true}
    outputs: [tts, player, recorder]
  tts:
    use: '@acpfx/tts-elevenlabs'
    settings: {voiceId: JBFqnCBsd6RMkjVDRZzb}
    outputs: [player]
  player:
    use: '@acpfx/audio-player'
    settings: {speechSource: tts, thinkingClip: ./sounds/thinking.wav, toolClip: ./sounds/typing.wav,
      sfxVolume: 0.3}
    outputs: [mic, recorder]
  recorder:
    use: '@acpfx/recorder'
    settings: {outputDir: ./recordings}
    outputs: []
