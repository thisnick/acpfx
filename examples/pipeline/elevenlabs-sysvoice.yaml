nodes:
  mic:
    use: '@acpfx/mic-aec'
    settings: {sampleRate: 16000, speechSource: player, debugDir: ./mic-debug}
    outputs: [stt]
  stt:
    use: '@acpfx/stt-elevenlabs'
    settings: {language: en}
    outputs: [bridge]
  bridge:
    use: '@acpfx/bridge-acpx'
    settings:
      agent: claude
      session: voice
      args: {approve-all: true}
    outputs: [tts, player]
  tts:
    use: '@acpfx/tts-deepgram'
    settings: {voice: aura-2-aries-en}
    outputs: [player]
  player:
    use: '@acpfx/audio-player'
    settings: {speechSource: tts, thinkingClip: ./sounds/thinking.wav, toolClip: ./sounds/typing.wav,
      sfxVolume: 0.3, noLocalPlayback: true}
    outputs: [mic]
