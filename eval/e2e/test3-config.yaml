nodes:
  mic:
    use: "@acpfx/mic-file"
    settings:
      path: ./eval/e2e/test3-input-padded.wav
      realtime: true
    outputs: [stt]
  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
    outputs: [recorder]
  recorder:
    use: "@acpfx/recorder"
    settings:
      outputDir: ./eval/e2e/test3-recordings
    outputs: []
