nodes:
  mic:
    use: "@acpfx/mic-sox"
    settings:
      sampleRate: 16000
      channels: 1
    outputs: [stt, recorder, ui]

  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
    outputs: [bridge, ui]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: codex
      session: voice              # named session
      args:
        approve-all: true         # extra acpx flags passed through
    outputs: [tts, player, ui, recorder]

  tts:
    use: "@acpfx/tts-elevenlabs"
    settings:
      voiceId: JBFqnCBsd6RMkjVDRZzb
    outputs: [player, ui]

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
      thinkingClip: ./sounds/thinking.wav
      toolClip: ./sounds/typing.wav
      sfxVolume: 0.3
    outputs: [recorder, ui]

  recorder:
    use: "@acpfx/recorder"
    settings:
      outputDir: ./recordings
    outputs: []

  ui:
    use: "@acpfx/ui-cli"
    outputs: []
