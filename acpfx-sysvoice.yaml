nodes:
  mic:
    use: "@acpfx/mic-aec"
    settings:
      sampleRate: 16000
      speechSource: player
      debugDir: ./mic-debug
    outputs: [stt, ui]

  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
    outputs: [bridge, ui]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: voice
      args:
        approve-all: true
    outputs: [tts, player, ui]

  tts:
    use: "@acpfx/tts-deepgram"
    settings:
      voice: aura-2-aries-en
    outputs: [player, ui]

  player:
    use: "@acpfx/audio-player"
    settings:
      speechSource: tts
      thinkingClip: ./sounds/thinking.wav
      toolClip: ./sounds/typing.wav
      sfxVolume: 0.3
      noLocalPlayback: true
    outputs: [mic, ui]

  ui:
    use: "@acpfx/ui-cli"
    outputs: []
