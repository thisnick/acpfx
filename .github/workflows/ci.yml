name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/release.yml'
      - 'LICENSE'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------- Detect what changed ----------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ts: ${{ steps.filter.outputs.ts }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'packages/orchestrator/src/**'
              - 'packages/schema/src/**'
              - 'packages/schema/bin/**'
              - 'packages/sys-voice/**'
              - 'packages/node-*/src/**'
              - 'packages/node-*/Cargo.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ts:
              - 'packages/core/**'
              - 'packages/node-sdk/**'
              - 'packages/node-*/**'
              - 'scripts/**'
              - 'tests/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
            schema:
              - 'packages/schema/**'

  # ---------- Rust: check + clippy ----------
  rust-check:
    name: Rust check & clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install PulseAudio dev libs
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings

  # ---------- Rust: tests ----------
  rust-test:
    name: Rust tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install PulseAudio dev libs
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - run: cargo test --workspace
      - name: Integration tests (orchestrator setup phase)
        run: |
          cargo build -p acpfx-orchestrator
          ./tests/dummy-node/run-tests.sh

  # ---------- TypeScript: type check + test ----------
  ts-check:
    name: TypeScript check & test
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install system deps for native modules
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check
      - name: Package tests
        run: pnpm test
      - name: Integration tests
        run: pnpm test:integration
      - name: npm pack integration tests (manifest via npx)
        run: ./tests/npm-pack-test.sh

  # ---------- Schema codegen drift check ----------
  schema-drift:
    name: Schema codegen drift check
    needs: changes
    if: needs.changes.outputs.schema == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run codegen
        run: cargo run -p acpfx-schema --bin acpfx-codegen
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'cargo run -p acpfx-schema --bin acpfx-codegen' and commit."
            exit 1
          fi
