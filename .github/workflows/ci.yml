name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/release.yml'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------- Rust: check + clippy ----------
  rust-check:
    name: Rust check & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install PulseAudio dev libs
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings

  # ---------- Rust: tests ----------
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install PulseAudio dev libs
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - run: cargo test --workspace

  # ---------- TypeScript: type check + test ----------
  ts-check:
    name: TypeScript check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install system deps for native modules
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check

  # ---------- Schema codegen drift check ----------
  schema-drift:
    name: Schema codegen drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run codegen
        run: cargo run -p acpfx-schema --bin acpfx-codegen
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'cargo run -p acpfx-schema --bin acpfx-codegen' and commit."
            exit 1
          fi
