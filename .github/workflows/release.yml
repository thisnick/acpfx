name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Changesets: version or publish ----------
  changesets:
    name: Changesets — version or publish
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      native-packages: ${{ steps.discover.outputs.packages }}
      native-any: ${{ steps.discover.outputs.any }}
      needs-cuda: ${{ steps.discover.outputs.needs_cuda }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install system deps for native modules
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Discover published native packages
        id: discover
        if: steps.changesets.outputs.published == 'true'
        shell: bash
        run: |
          PUBLISHED='${{ steps.changesets.outputs.publishedPackages }}'

          # Scan all packages/*/Cargo.toml that have a [[bin]] section
          # and a sibling package.json (i.e., npm-publishable native crates).
          PACKAGES="[]"
          NEEDS_CUDA=false
          for cargo_toml in packages/*/Cargo.toml; do
            pkg_dir="$(dirname "$cargo_toml")"
            pkg_json="$pkg_dir/package.json"

            [ -f "$pkg_json" ] || continue

            binary_name=$(grep -A1 '^\[\[bin\]\]' "$cargo_toml" | grep '^name' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            [ -n "$binary_name" ] || continue

            npm_name=$(node -p "require('./$pkg_json').name")
            cargo_pkg=$(grep '^name' "$cargo_toml" | head -1 | sed 's/.*= *"\(.*\)"/\1/')

            was_published=$(echo "$PUBLISHED" | node -e "
              const d=require('fs').readFileSync(0,'utf8');
              const pkgs=JSON.parse(d);
              const match=pkgs.find(p=>p.name==='$npm_name');
              if(match) console.log(match.version);
              else console.log('');
            ")

            if [ -n "$was_published" ]; then
              has_metal=false
              has_cuda=false
              if grep -q 'metal' "$cargo_toml" 2>/dev/null; then has_metal=true; fi
              if grep -q 'cuda' "$cargo_toml" 2>/dev/null; then has_cuda=true; NEEDS_CUDA=true; fi

              echo "Found: $npm_name v$was_published (bin=$binary_name, metal=$has_metal, cuda=$has_cuda)"
              PACKAGES=$(echo "$PACKAGES" | node -e "
                const d=require('fs').readFileSync(0,'utf8');
                const arr=JSON.parse(d);
                arr.push({
                  npm_name:'$npm_name',cargo_pkg:'$cargo_pkg',
                  binary_name:'$binary_name',version:'$was_published',
                  has_metal:$has_metal,has_cuda:$has_cuda
                });
                console.log(JSON.stringify(arr));
              ")
            fi
          done

          echo "Discovered: $PACKAGES"

          if [ "$PACKAGES" = "[]" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            echo "needs_cuda=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
            echo "needs_cuda=$NEEDS_CUDA" >> "$GITHUB_OUTPUT"
          fi

  # ---------- Build all native binaries per platform ----------
  build-platform:
    name: Build native (${{ matrix.platform }})
    needs: changesets
    if: needs.changesets.outputs.native-any == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            platform: darwin-arm64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux-x64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            platform: win32-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: win32-x64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install system libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev cmake
      - name: Install system libs (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build published packages
        env:
          # Fix for newer CMake rejecting old cmake_minimum_required in audiopus_sys
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        shell: bash
        run: |
          PKGS='${{ needs.changesets.outputs.native-packages }}'
          IS_DARWIN=${{ contains(matrix.target, 'apple') }}

          echo "$PKGS" | node -e "
            const pkgs=JSON.parse(require('fs').readFileSync(0,'utf8'));
            pkgs.forEach(p=>{
              const isDarwin='$IS_DARWIN'==='true';
              const features=(isDarwin && p.has_metal)?'metal':'';
              console.log(p.cargo_pkg+' '+features);
            });
          " | while read pkg features; do
            if [ -n "$features" ]; then
              echo "Building $pkg with --features $features"
              cargo build --release --target ${{ matrix.target }} --features "$features" -p "$pkg"
            else
              echo "Building $pkg"
              cargo build --release --target ${{ matrix.target }} -p "$pkg"
            fi
          done

      - name: Collect published binaries
        shell: bash
        run: |
          PKGS='${{ needs.changesets.outputs.native-packages }}'
          EXT=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then EXT=".exe"; fi

          echo "$PKGS" | node -e "
            const pkgs=JSON.parse(require('fs').readFileSync(0,'utf8'));
            pkgs.forEach(p=>console.log(p.binary_name+' '+p.npm_name+' '+p.version));
          " | while read binary_name npm_name version; do
            src="target/${{ matrix.target }}/release/${binary_name}${EXT}"
            dst="${binary_name}-${{ matrix.platform }}${EXT}"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
              echo "Collected: $dst"
            else
              echo "WARN: $src not found"
            fi
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: "*-${{ matrix.platform }}*"

  # NOTE: CUDA CI builds disabled.
  # - Linux: Jimver/cuda-toolkit fails on Ubuntu 24.04 (cuda-12-x package not found)
  # - Windows: CRT mismatch between candle-kernels (/MT) and sentencepiece-sys (/MD)
  # Postinstall falls back to CPU binaries. Users can build CUDA locally:
  #   cargo build --release --features cuda -p node-stt-kyutai
  #   cargo build --release --features cuda -p node-tts-pocket

  # ---------- GitHub Releases ----------
  github-release:
    name: Create GitHub Releases
    runs-on: ubuntu-latest
    needs: [changesets, build-platform]
    if: always() && needs.changesets.outputs.native-any == 'true' && needs.build-platform.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-staging/
          merge-multiple: false

      - name: Create GitHub releases for each native package
        env:
          GH_TOKEN: ${{ github.token }}
          NATIVE_PACKAGES: ${{ needs.changesets.outputs.native-packages }}
        run: |
          echo "$NATIVE_PACKAGES" | node -e "
            const pkgs=JSON.parse(require('fs').readFileSync(0,'utf8'));
            pkgs.forEach(p=>console.log(p.npm_name+' '+p.binary_name+' '+p.version));
          " | while read npm_name binary_name version; do
            TAG="${npm_name}@${version}"
            echo "Creating release: $TAG"

            # Collect all binaries for this package from all platform artifacts
            mkdir -p "assets-${binary_name}"
            for dir in release-staging/release-*/; do
              for f in "$dir"${binary_name}-*; do
                [ -f "$f" ] && cp "$f" "assets-${binary_name}/"
              done
            done

            if [ -d "assets-${binary_name}" ] && [ "$(ls -A "assets-${binary_name}")" ]; then
              ls -la "assets-${binary_name}/"
              # Delete existing release if it exists, then create fresh
              gh release delete "$TAG" --yes 2>/dev/null || true
              gh release create "$TAG" \
                --title "$TAG" \
                --generate-notes \
                "assets-${binary_name}"/*
            else
              echo "WARN: No binaries found for $binary_name"
            fi
          done
