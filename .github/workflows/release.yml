name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Changesets: version or publish ----------
  changesets:
    name: Changesets — version or publish
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install system deps for native modules
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------- Build orchestrator for all 6 targets ----------
  build-orchestrator:
    name: Build orchestrator (${{ matrix.npm-pkg }})
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: darwin-arm64
            binary: acpfx
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            npm-pkg: darwin-x64
            binary: acpfx
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            npm-pkg: linux-arm64
            binary: acpfx
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
            binary: acpfx
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            npm-pkg: win32-arm64
            binary: acpfx.exe
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-x64
            binary: acpfx.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p acpfx-orchestrator
        shell: bash
      - name: Rename binary for release
        run: |
          ext=""
          if [[ "${{ matrix.binary }}" == *.exe ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "acpfx-${{ matrix.npm-pkg }}${ext}"
        shell: bash
      - name: Upload binary for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: release-orchestrator-${{ matrix.npm-pkg }}
          path: acpfx-${{ matrix.npm-pkg }}*

  # ---------- Build mic-aec (native runners only) ----------
  build-mic-aec:
    name: Build mic-aec (${{ matrix.npm-pkg }})
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: darwin-arm64
            binary: mic-aec
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            npm-pkg: darwin-x64
            binary: mic-aec
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            npm-pkg: linux-arm64
            binary: mic-aec
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
            binary: mic-aec
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            npm-pkg: win32-arm64
            binary: mic-aec.exe
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-x64
            binary: mic-aec.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install PulseAudio dev libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mic-aec
        shell: bash
      - name: Rename binary for release
        run: |
          ext=""
          if [[ "${{ matrix.binary }}" == *.exe ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "mic-aec-${{ matrix.npm-pkg }}${ext}"
        shell: bash
      - name: Upload binary for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: release-mic-aec-${{ matrix.npm-pkg }}
          path: mic-aec-${{ matrix.npm-pkg }}*

  # ---------- GitHub Release ----------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [changesets, build-orchestrator, build-mic-aec]
    if: needs.changesets.outputs.published == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Extract acpfx version
        id: version
        run: echo "version=$(node -p "require('./packages/orchestrator/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-staging/
          merge-multiple: false

      - name: Collect binaries
        run: |
          mkdir -p release-assets
          for dir in release-staging/release-*/; do
            cp "$dir"/* release-assets/
          done
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@acpfx/cli@${{ steps.version.outputs.version }}"
          files: release-assets/*
          generate_release_notes: true
