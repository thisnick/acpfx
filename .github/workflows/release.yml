name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Changesets: version or publish ----------
  changesets:
    name: Changesets — version or publish
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      cli-published: ${{ steps.check-pkgs.outputs.cli }}
      mic-speaker-published: ${{ steps.check-pkgs.outputs.mic-speaker }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install system deps for native modules
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Check which binary packages were published
        id: check-pkgs
        if: steps.changesets.outputs.published == 'true'
        run: |
          PKGS='${{ steps.changesets.outputs.publishedPackages }}'
          CLI=$(echo "$PKGS" | node -e "const d=require('fs').readFileSync(0,'utf8');console.log(JSON.parse(d).some(p=>p.name==='@acpfx/cli'))")
          MIC=$(echo "$PKGS" | node -e "const d=require('fs').readFileSync(0,'utf8');console.log(JSON.parse(d).some(p=>p.name==='@acpfx/mic-speaker'))")
          echo "cli=$CLI" >> "$GITHUB_OUTPUT"
          echo "mic-speaker=$MIC" >> "$GITHUB_OUTPUT"
          echo "Published packages: cli=$CLI mic-speaker=$MIC"

  # ---------- Build orchestrator (only if @acpfx/cli was published) ----------
  build-orchestrator:
    name: Build orchestrator (${{ matrix.npm-pkg }})
    needs: changesets
    if: needs.changesets.outputs.cli-published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: darwin-arm64
            binary: acpfx
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            npm-pkg: darwin-x64
            binary: acpfx
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            npm-pkg: linux-arm64
            binary: acpfx
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
            binary: acpfx
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            npm-pkg: win32-arm64
            binary: acpfx.exe
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-x64
            binary: acpfx.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p acpfx-orchestrator
        shell: bash
      - name: Rename binary for release
        run: |
          ext=""
          if [[ "${{ matrix.binary }}" == *.exe ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "acpfx-${{ matrix.npm-pkg }}${ext}"
        shell: bash
      - name: Upload binary for GitHub Release
        uses: actions/upload-artifact@v7
        with:
          name: release-orchestrator-${{ matrix.npm-pkg }}
          path: acpfx-${{ matrix.npm-pkg }}*

  # ---------- Build mic-speaker (only if @acpfx/mic-speaker was published) ----------
  build-mic-speaker:
    name: Build mic-speaker (${{ matrix.npm-pkg }})
    needs: changesets
    if: needs.changesets.outputs.mic-speaker-published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: darwin-arm64
            binary: mic-speaker
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            npm-pkg: darwin-x64
            binary: mic-speaker
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            npm-pkg: linux-arm64
            binary: mic-speaker
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
            binary: mic-speaker
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            npm-pkg: win32-arm64
            binary: mic-speaker.exe
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-x64
            binary: mic-speaker.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install PulseAudio dev libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mic-speaker
        shell: bash
      - name: Rename binary for release
        run: |
          ext=""
          if [[ "${{ matrix.binary }}" == *.exe ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "mic-speaker-${{ matrix.npm-pkg }}${ext}"
        shell: bash
      - name: Upload binary for GitHub Release
        uses: actions/upload-artifact@v7
        with:
          name: release-mic-speaker-${{ matrix.npm-pkg }}
          path: mic-speaker-${{ matrix.npm-pkg }}*

  # ---------- GitHub Releases ----------
  github-release:
    name: Create GitHub Releases
    runs-on: ubuntu-latest
    needs: [changesets, build-orchestrator, build-mic-speaker]
    if: always() && needs.changesets.outputs.published == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Extract versions
        id: versions
        run: |
          echo "cli=$(node -p "require('./packages/orchestrator/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "mic_speaker=$(node -p "require('./packages/node-mic-speaker/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        if: needs.build-orchestrator.result == 'success' || needs.build-mic-speaker.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-staging/
          merge-multiple: false

      - name: Create @acpfx/cli release
        if: needs.build-orchestrator.result == 'success'
        run: |
          mkdir -p cli-assets
          for dir in release-staging/release-orchestrator-*/; do
            cp "$dir"/* cli-assets/
          done
          ls -la cli-assets/

      - name: Upload @acpfx/cli release
        if: needs.build-orchestrator.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@acpfx/cli@${{ steps.versions.outputs.cli }}"
          files: cli-assets/*
          generate_release_notes: true

      - name: Create @acpfx/mic-speaker release
        if: needs.build-mic-speaker.result == 'success'
        run: |
          mkdir -p mic-speaker-assets
          for dir in release-staging/release-mic-speaker-*/; do
            cp "$dir"/* mic-speaker-assets/
          done
          ls -la mic-speaker-assets/

      - name: Upload @acpfx/mic-speaker release
        if: needs.build-mic-speaker.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@acpfx/mic-speaker@${{ steps.versions.outputs.mic_speaker }}"
          files: mic-speaker-assets/*
          generate_release_notes: true
