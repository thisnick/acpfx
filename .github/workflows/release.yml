name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Build orchestrator for all 6 targets ----------
  build-orchestrator:
    name: Build orchestrator (${{ matrix.npm-pkg }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: darwin-arm64
            binary: acpfx
          - target: x86_64-apple-darwin
            runner: macos-13
            npm-pkg: darwin-x64
            binary: acpfx
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-arm64
            binary: acpfx
            use-cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
            binary: acpfx
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-arm64
            binary: acpfx.exe
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-x64
            binary: acpfx.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked
      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p acpfx-orchestrator
          else
            cargo build --release --target ${{ matrix.target }} -p acpfx-orchestrator
          fi
        shell: bash
      - name: Stage binary into npm package
        run: |
          mkdir -p npm/acpfx/${{ matrix.npm-pkg }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/acpfx/${{ matrix.npm-pkg }}/bin/${{ matrix.binary }}
        shell: bash
      - name: Upload npm package dir
        uses: actions/upload-artifact@v4
        with:
          name: npm-acpfx-${{ matrix.npm-pkg }}
          path: npm/acpfx/${{ matrix.npm-pkg }}/
      - name: Upload raw binary for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: release-orchestrator-${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ---------- Build mic-aec (native runners only) ----------
  build-mic-aec:
    name: Build mic-aec (${{ matrix.npm-pkg }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: darwin-arm64
            binary: mic-aec
          - target: x86_64-apple-darwin
            runner: macos-13
            npm-pkg: darwin-x64
            binary: mic-aec
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
            binary: mic-aec
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: win32-x64
            binary: mic-aec.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install PulseAudio dev libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mic-aec
        shell: bash
      - name: Stage binary into npm package
        run: |
          mkdir -p npm/mic-aec/${{ matrix.npm-pkg }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/mic-aec/${{ matrix.npm-pkg }}/bin/${{ matrix.binary }}
        shell: bash
      - name: Upload npm package dir
        uses: actions/upload-artifact@v4
        with:
          name: npm-mic-aec-${{ matrix.npm-pkg }}
          path: npm/mic-aec/${{ matrix.npm-pkg }}/
      - name: Upload raw binary for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: release-mic-aec-${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ---------- Publish to npm ----------
  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [build-orchestrator, build-mic-aec]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all npm package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: staging/

      # Overlay built binaries onto the checked-in npm/ package.json files
      - name: Assemble packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # --- orchestrator platform packages ---
          for dir in staging/npm-acpfx-*/; do
            platform=$(basename "$dir" | sed 's/npm-acpfx-//')
            target="npm/acpfx/${platform}"
            cp -r "$dir"/* "$target"/
            chmod +x "$target"/bin/* 2>/dev/null || true
            # Stamp version
            node -e "
              const p = require('./${target}/package.json');
              p.version = '${VERSION}';
              require('fs').writeFileSync('./${target}/package.json', JSON.stringify(p, null, 2) + '\n');
            "
            echo "Assembled: $target (v${VERSION})"
          done

          # --- mic-aec platform packages ---
          for dir in staging/npm-mic-aec-*/; do
            platform=$(basename "$dir" | sed 's/npm-mic-aec-//')
            target="npm/mic-aec/${platform}"
            cp -r "$dir"/* "$target"/
            chmod +x "$target"/bin/* 2>/dev/null || true
            node -e "
              const p = require('./${target}/package.json');
              p.version = '${VERSION}';
              require('fs').writeFileSync('./${target}/package.json', JSON.stringify(p, null, 2) + '\n');
            "
            echo "Assembled: $target (v${VERSION})"
          done

          # --- wrapper packages: stamp version + update optionalDependencies ---
          for wrapper in npm/acpfx/package.json npm/mic-aec/package.json; do
            node -e "
              const p = require('./${wrapper}');
              p.version = '${VERSION}';
              if (p.optionalDependencies) {
                for (const dep of Object.keys(p.optionalDependencies)) {
                  p.optionalDependencies[dep] = '${VERSION}';
                }
              }
              require('fs').writeFileSync('./${wrapper}', JSON.stringify(p, null, 2) + '\n');
            "
            echo "Stamped: $wrapper (v${VERSION})"
          done

      # Publish platform packages first, then wrappers
      - name: Publish orchestrator platform packages
        run: |
          for dir in npm/acpfx/darwin-* npm/acpfx/linux-* npm/acpfx/win32-*; do
            [ -f "$dir/bin/"* ] || continue
            echo "Publishing $(node -p "require('./$dir/package.json').name")"
            npm publish "$dir" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mic-aec platform packages
        run: |
          for dir in npm/mic-aec/darwin-* npm/mic-aec/linux-* npm/mic-aec/win32-*; do
            [ -f "$dir/bin/"* ] || continue
            echo "Publishing $(node -p "require('./$dir/package.json').name")"
            npm publish "$dir" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @acpfx/cli wrapper
        run: npm publish npm/acpfx --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @acpfx/mic-aec wrapper
        run: npm publish npm/mic-aec --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------- GitHub Release ----------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-orchestrator, build-mic-aec]
    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-staging/
          merge-multiple: false

      - name: Flatten and rename binaries
        run: |
          mkdir -p release-assets
          for dir in release-staging/release-*/; do
            name=$(basename "$dir")  # e.g. release-orchestrator-darwin-arm64
            kind=$(echo "$name" | sed 's/release-//' | sed 's/-\(darwin\|linux\|win32\)//')
            platform=$(echo "$name" | sed "s/release-${kind}-//")
            for f in "$dir"/*; do
              base=$(basename "$f")
              ext=""
              if [[ "$base" == *.exe ]]; then
                ext=".exe"
                base="${base%.exe}"
              fi
              mv "$f" "release-assets/${base}-${platform}${ext}"
            done
          done
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
