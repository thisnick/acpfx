nodes:
  mic:
    use: "@acpfx/mic-sox"
    settings:
      sampleRate: 16000
    outputs: [echo-gate]

  echo-gate:
    use: "@acpfx/echo-gate"
    settings:
      bargeInThreshold: 1500
    outputs: [stt]

  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
    outputs: [bridge]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: voice
      args:
        approve-all: true
    outputs: [tts]

  tts:
    use: "@acpfx/tts-elevenlabs"
    settings:
      voiceId: JBFqnCBsd6RMkjVDRZzb
    outputs: [speaker, echo-gate]


  speaker:
    use: "@acpfx/play-sox"
    outputs: []
