[package]
name = "acpfx-orchestrator"
version = "0.6.0"
edition = "2021"
description = "Rust orchestrator for acpfx DAG-based audio pipelines"

[[bin]]
name = "acpfx"
path = "src/main.rs"

[dependencies]
acpfx-schema = { path = "../schema" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
indexmap = { version = "2", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
thiserror = "1"
ratatui = "0.29"
crossterm = "0.28"
dirs = "5"

[build-dependencies]
serde_json = "1"

[dev-dependencies]
tempfile = "3"
