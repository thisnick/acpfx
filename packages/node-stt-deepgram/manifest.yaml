name: stt-deepgram
description: Speech-to-text via Deepgram streaming API
consumes:
  - audio.chunk
  - audio.start
  - audio.end
emits:
  - speech.partial
  - speech.final
  - speech.pause
  - lifecycle.ready
  - lifecycle.done
  - control.error
arguments:
  language:
    type: string
    default: "en"
    description: "Language code (e.g., en, fr, de, ja, zh, es). Use 'multi' for automatic multi-language detection. See https://developers.deepgram.com/docs/language"
  model:
    type: string
    default: "nova-3"
    description: "Deepgram model name"
  utteranceEndMs:
    type: number
    default: 1000
    description: "Milliseconds of silence before utterance end"
  endpointing:
    type: number
    default: 300
    description: "VAD endpointing threshold in ms"
  apiKey:
    type: string
    description: "Deepgram API key (overrides DEEPGRAM_API_KEY env var)"
  turnDetection:
    type: boolean
    default: true
    description: "Enable turn detection (set false for push-to-talk mode)"
env:
  DEEPGRAM_API_KEY:
    required: true
    description: "Deepgram API key for STT"
