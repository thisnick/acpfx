name: mic-speaker
description: Captures mic audio with acoustic echo cancellation (native Rust)
consumes:
  - audio.chunk
  - control.interrupt
  - custom.mute
emits:
  - audio.chunk
  - audio.level
  - node.status
  - lifecycle.ready
  - lifecycle.done
  - control.error
arguments:
  mode:
    type: string
    default: "continuous"
    enum: ["continuous", "ptt"]
    description: "continuous = always listening with AEC, ptt = push-to-talk (hold Space to talk, no AEC)"
  sampleRate:
    type: number
    default: 16000
    description: "Target sample rate in Hz"
  chunkMs:
    type: number
    default: 100
    description: "Chunk duration in milliseconds"
  speaker:
    type: string
    default: "player"
    description: "Node name whose audio to use as speaker reference for AEC"
  debugDir:
    type: string
    description: "Directory to write debug WAV recordings"
ui:
  controls:
    - id: mute
      type: toggle
      label: "Mute"
      hold: true
      keybind: space
      event:
        type: custom.mute
        field: muted
