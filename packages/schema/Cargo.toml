[package]
name = "acpfx-schema"
version = "0.1.0"
edition = "2021"
description = "Canonical event type definitions for acpfx pipelines"

[lib]
name = "acpfx_schema"
path = "src/lib.rs"

[[bin]]
name = "acpfx-codegen"
path = "bin/codegen.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "0.8"
