[package]
name = "node-tts-pocket"
version = "0.2.8"
edition = "2021"

[[bin]]
name = "tts-pocket"
path = "src/main.rs"

[dependencies]
pocket-tts = { git = "https://github.com/babybirdprd/pocket-tts", package = "pocket-tts" }
candle-core = "0.9.1"
dirs = "5"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
base64 = "0.22"
rubato = "0.14"
hound = "3.5"

[features]
default = []
metal = ["pocket-tts/metal", "candle-core/metal"]
cuda = ["candle-core/cuda"]