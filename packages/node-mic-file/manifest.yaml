name: mic-file
description: Plays back a WAV file as if it were mic input
consumes:
  - control.interrupt
emits:
  - audio.chunk
  - audio.level
  - lifecycle.ready
  - lifecycle.done
arguments:
  path:
    type: string
    required: true
    description: "Path to WAV file to play back"
  realtime:
    type: boolean
    description: "Whether to play back at real-time speed"
  chunkMs:
    type: number
    description: "Chunk duration in milliseconds"
