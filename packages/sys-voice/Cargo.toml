[package]
name = "sys-voice"
version = "0.2.1"
edition = "2021"
description = "Cross-platform native voice I/O with OS-level AEC (forked for acpfx)"

[lib]
name = "sys_voice"
path = "src/lib.rs"

[dependencies]
flume = "0.11"
rubato = "0.16"
thiserror = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync"] }
tracing = "0.1"

[target.'cfg(target_os = "linux")'.dependencies]
libpulse-binding = "2"
libpulse-simple-binding = "2"

[target.'cfg(target_os = "macos")'.dependencies]
coreaudio-rs = "0.12"
coreaudio-sys = "0.2"

[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.22"
