name: mic-sox
description: Captures audio from system microphone via sox/rec
consumes:
  - control.interrupt
emits:
  - audio.chunk
  - audio.level
  - lifecycle.ready
  - lifecycle.done
  - control.error
arguments:
  sampleRate:
    type: number
    default: 16000
    description: "Audio sample rate in Hz"
  channels:
    type: number
    default: 1
    description: "Number of audio channels"
  chunkMs:
    type: number
    default: 100
    description: "Chunk duration in milliseconds"
  noiseGateRms:
    type: number
    description: "RMS threshold below which silence is emitted"
