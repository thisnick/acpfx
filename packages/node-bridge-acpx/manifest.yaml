name: bridge-acpx
description: Agent bridge connecting to Claude via ACP
consumes:
  - speech.partial
  - speech.pause
  - prompt.text
  - control.interrupt
emits:
  - agent.submit
  - agent.delta
  - agent.complete
  - agent.thinking
  - agent.tool_start
  - agent.tool_done
  - control.interrupt
  - control.error
  - lifecycle.ready
  - lifecycle.done
additional_arguments: true
arguments:
  agent:
    type: string
    required: true
    description: "Agent to connect to"
  session:
    type: string
    description: "Session type (e.g., voice)"
  verbose:
    type: boolean
    description: "Enable verbose logging"
