name: stt-kyutai
description: Local speech-to-text via Kyutai moshi (on-device, no API key needed)
consumes:
  - audio.chunk
  - audio.start
  - audio.end
emits:
  - speech.partial
  - speech.final
  - speech.pause
  - lifecycle.ready
  - lifecycle.done
  - log
arguments:
  model:
    type: string
    default: "kyutai/stt-1b-en_fr-candle"
    description: "HuggingFace model ID for STT"
  language:
    type: string
    default: "en"
    description: "Language code (en or fr). The default stt-1b-en_fr model supports English and French. Use stt-2.6b-en model for English-only with higher quality"
  device:
    type: string
    default: "auto"
    description: "Compute device: auto, cpu, cuda, or metal"
  turnDetection:
    type: boolean
    default: true
    description: "Enable turn detection (set false for push-to-talk mode)"
