[package]
name = "node-stt-kyutai"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "stt-kyutai"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
candle-core = "0.9.1"
candle-nn = "0.9.1"
candle-transformers = "0.9.1"
dirs = "5"
hf-hub = "0.4.3"
kaudio = "0.2.1"
moshi = "0.6.1"
sentencepiece = "0.11.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
rubato = "0.14"

[features]
default = []
cuda = ["candle-core/cuda", "candle-nn/cuda"]
metal = ["candle-core/metal", "candle-nn/metal"]
