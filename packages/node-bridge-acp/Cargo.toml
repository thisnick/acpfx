[package]
name = "bridge-acp"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bridge-acp"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "process", "sync", "time", "fs"] }
uuid = { version = "1", features = ["v4"] }
