name: tts-elevenlabs
description: Text-to-speech via ElevenLabs streaming API
consumes:
  - agent.delta
  - agent.complete
  - agent.tool_start
  - control.interrupt
emits:
  - audio.chunk
  - lifecycle.ready
  - lifecycle.done
  - control.error
arguments:
  voiceId:
    type: string
    description: "ElevenLabs voice ID. Each voice has a language — browse voices at https://elevenlabs.io/voice-library"
  model:
    type: string
    description: "ElevenLabs model (e.g., eleven_turbo_v2_5 for low latency, eleven_multilingual_v2 for 29 languages)"
  apiKey:
    type: string
    description: "ElevenLabs API key (overrides ELEVENLABS_API_KEY env var)"
env:
  ELEVENLABS_API_KEY:
    required: true
    description: "ElevenLabs API key for TTS"
