name: stt-elevenlabs
description: Speech-to-text via ElevenLabs streaming API
consumes:
  - audio.chunk
  - audio.start
  - audio.end
emits:
  - speech.partial
  - speech.delta
  - speech.final
  - speech.pause
  - lifecycle.ready
  - lifecycle.done
  - control.error
arguments:
  language:
    type: string
    default: "en"
    description: "Language code for transcription"
  apiKey:
    type: string
    description: "ElevenLabs API key (overrides ELEVENLABS_API_KEY env var)"
  pauseMs:
    type: number
    description: "Pause duration threshold in ms"
  vadThreshold:
    type: number
    description: "VAD threshold 0-1 (higher = less sensitive)"
  minSpeechDurationMs:
    type: number
    description: "Minimum speech duration in ms (ignore short noise bursts)"
  minSilenceDurationMs:
    type: number
    description: "Minimum silence duration in ms"
  turnDetection:
    type: boolean
    default: true
    description: "Enable turn detection (set false for push-to-talk mode)"
env:
  ELEVENLABS_API_KEY:
    required: true
    description: "ElevenLabs API key for STT"
