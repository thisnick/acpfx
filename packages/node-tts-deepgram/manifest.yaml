name: tts-deepgram
description: Text-to-speech via Deepgram streaming API
consumes:
  - agent.submit
  - agent.delta
  - agent.complete
  - agent.tool_start
  - control.interrupt
emits:
  - audio.chunk
  - lifecycle.ready
  - lifecycle.done
  - control.error
arguments:
  voice:
    type: string
    default: "aura-2-apollo-en"
    description: "Deepgram voice model (e.g., aura-2-apollo-en, aura-2-aries-en). Language is determined by voice name suffix. See https://developers.deepgram.com/docs/tts-models"
  sampleRate:
    type: number
    default: 16000
    description: "Audio sample rate in Hz"
  apiKey:
    type: string
    description: "Deepgram API key (overrides DEEPGRAM_API_KEY env var)"
env:
  DEEPGRAM_API_KEY:
    required: true
    description: "Deepgram API key for TTS"
