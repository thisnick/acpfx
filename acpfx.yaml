nodes:
  mic:
    use: "@acpfx/mic-sox"
    settings:
      sampleRate: 16000
      channels: 1
    outputs: [echo-gate, recorder, ui]

  echo-gate:
    use: "@acpfx/echo-gate"
    settings:
      bargeInThreshold: 1500
    outputs: [stt]

  stt:
    use: "@acpfx/stt-elevenlabs"
    settings:
      language: en
    outputs: [bridge, ui]

  bridge:
    use: "@acpfx/bridge-acpx"
    settings:
      agent: claude
      session: voice
      args:
        approve-all: true
    outputs: [tts, ui, recorder]

  tts:
    use: "@acpfx/tts-elevenlabs"
    settings:
      voiceId: JBFqnCBsd6RMkjVDRZzb
    outputs: [speaker, recorder, ui, echo-gate]

  speaker:
    use: "@acpfx/play-sox"
    outputs: []

  recorder:
    use: "@acpfx/recorder"
    settings:
      outputDir: ./recordings
    outputs: []

  ui:
    use: "@acpfx/ui-cli"
    outputs: []
